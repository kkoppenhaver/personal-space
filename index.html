<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Personal Space</title>
  <style>
    :root {
      --paper: #f4ede0;
      --ink: #1f1a14;
      --accent: #ff6f3c;
    }
    html, body { margin: 0; padding: 0; height: 100%; background: #000; color: var(--paper); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }

    #hud { position: fixed; inset: 0; pointer-events: none; }
    #hud > * { pointer-events: auto; }

    #stats { position: absolute; top: 14px; right: 14px; padding: 10px 12px; background: rgba(20,16,12,0.55); border: 1px solid rgba(244,237,224,0.18); border-radius: 6px; font-size: 12px; line-height: 1.5; min-width: 170px; backdrop-filter: blur(6px); }
    #stats .label { opacity: 0.55; }
    #stats .val { float: right; }

    #toast { position: absolute; top: 26%; left: 0; right: 0; text-align: center; font-size: 22px; letter-spacing: 0.18em; opacity: 0; transition: opacity 0.4s; text-shadow: 0 0 16px rgba(0,0,0,0.6); }
    #toast.show { opacity: 1; }

    #flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    #flash.show { opacity: 0.55; transition: opacity 0.05s; }

    #pings { position: absolute; bottom: 14px; left: 14px; right: 14px; display: flex; gap: 10px; font-size: 12px; opacity: 0.85; }
    #pings .ping { background: rgba(20,16,12,0.55); border: 1px solid rgba(244,237,224,0.18); border-radius: 6px; padding: 7px 10px; max-width: 260px; }
    #pings .ping .name { color: var(--accent); font-weight: bold; margin-right: 6px; }

    #landmark { position: absolute; top: 38%; left: 0; right: 0; text-align: center; font-size: 16px; letter-spacing: 0.1em; opacity: 0; transition: opacity 0.6s; }
    #landmark.show { opacity: 0.9; }

    #logbook-toggle { position: absolute; top: 14px; left: 14px; background: rgba(20,16,12,0.55); border: 1px solid rgba(244,237,224,0.18); border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer; color: var(--paper); }

    #logbook { position: absolute; top: 0; left: 0; bottom: 0; width: 320px; background: rgba(20,16,12,0.92); border-right: 1px solid rgba(244,237,224,0.18); transform: translateX(-100%); transition: transform 0.3s; padding: 14px; overflow-y: auto; font-size: 12px; backdrop-filter: blur(8px); }
    #logbook.open { transform: translateX(0); }
    #logbook h2 { margin: 0 0 10px 0; font-size: 14px; letter-spacing: 0.18em; color: var(--accent); }
    #logbook .entry { border-bottom: 1px solid rgba(244,237,224,0.08); padding: 10px 0; cursor: pointer; }
    #logbook .entry:hover { background: rgba(244,237,224,0.04); }
    #logbook .entry .row { display: flex; justify-content: space-between; align-items: center; }
    #logbook .entry .name { color: var(--accent); font-weight: bold; }
    #logbook .entry .biome { opacity: 0.6; }
    #logbook .entry .ts { opacity: 0.4; font-size: 10px; margin-top: 4px; }
    #logbook .entry .sync { font-size: 11px; line-height: 1; }
    #logbook .sync-ok { color: #6ed28d; }
    #logbook .sync-pending { color: #d4b06e; }
    #logbook .sync-failed { color: #d26e72; }
    #logbook .sync-muted { color: rgba(244,237,224,0.3); }
    #logbook .section-divider { font-size: 10px; letter-spacing: 0.18em; opacity: 0.4; margin: 16px 0 6px; }
    #logbook .back-btn { background: none; border: 1px solid rgba(244,237,224,0.2); color: var(--paper); font: inherit; padding: 4px 10px; border-radius: 4px; cursor: pointer; margin-bottom: 10px; }
    #logbook .thumb { display: block; width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 6px; margin-bottom: 10px; background: #111; }
    #logbook .thumb.placeholder { /* gradient already set inline */ }
    #logbook .detail-title { color: var(--accent); font-size: 16px; font-weight: bold; }
    #logbook .detail-biome { opacity: 0.6; margin-bottom: 12px; }
    #logbook .lore { line-height: 1.55; }
    #logbook .lore.muted { opacity: 0.5; font-style: italic; }
    #logbook .landmark { margin: 6px 0; }
    #logbook .landmark .lname { color: var(--accent); font-size: 11px; }
    #logbook .landmark .lblurb { opacity: 0.75; }
    #logbook .stats { margin-top: 4px; }
    #logbook .stat-row { display: flex; justify-content: space-between; font-size: 11px; line-height: 1.8; }
    #logbook .stat-label { opacity: 0.55; letter-spacing: 0.08em; }
    #logbook .detail-ts { opacity: 0.4; font-size: 10px; margin-top: 14px; }

    #boot { position: absolute; inset: 0; background: #000; color: var(--paper); display: flex; align-items: center; justify-content: center; font-size: 14px; letter-spacing: 0.2em; }
    #boot.hidden { display: none; }

    #controls-help { position: absolute; bottom: 14px; right: 14px; font-size: 11px; opacity: 0.5; text-align: right; line-height: 1.6; }

    #pause-menu { position: absolute; inset: 0; background: rgba(8, 6, 4, 0.55); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 50; }
    #pause-menu.show { display: flex; }
    #pause-menu .card { background: rgba(20,16,12,0.92); border: 1px solid rgba(244,237,224,0.22); border-radius: 10px; padding: 28px 40px 24px; text-align: center; min-width: 280px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
    #pause-menu h1 { margin: 0 0 14px 0; font-size: 26px; letter-spacing: 0.32em; color: var(--accent); }
    #pause-menu .resume-hint { font-size: 12px; opacity: 0.75; margin-bottom: 22px; letter-spacing: 0.16em; }
    #pause-menu .controls { font-size: 11px; opacity: 0.55; line-height: 1.8; letter-spacing: 0.08em; }
    #pause-menu button { background: rgba(255,111,60,0.15); border: 1px solid rgba(255,111,60,0.55); color: var(--accent); font: 12px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 0.18em; padding: 8px 18px; border-radius: 6px; cursor: pointer; margin-bottom: 18px; }
    #pause-menu button:hover { background: rgba(255,111,60,0.28); }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud">
    <div id="stats">
      <div><span class="label">SPEED</span><span class="val" id="stat-speed">—</span></div>
      <div><span class="label">ALT</span><span class="val" id="stat-alt">—</span></div>
      <div><span class="label">ATMOS</span><span class="val" id="stat-atm">—</span></div>
      <div><span class="label">STATE</span><span class="val" id="stat-state">—</span></div>
    </div>
    <div id="landmark"></div>
    <div id="toast"></div>
    <div id="flash"></div>
    <div id="pings"></div>
    <button id="logbook-toggle">LOGBOOK · L</button>
    <aside id="logbook"><h2>LOGBOOK</h2><div id="logbook-list"></div></aside>
    <div id="controls-help">↑↓ pitch · ←→ bank · SPACE throttle · SHIFT brake · R reset · L log · ESC pause</div>
    <div id="pause-menu">
      <div class="card">
        <h1>PAUSED</h1>
        <button id="resume-btn">RESUME</button>
        <div class="resume-hint">ESC TO RESUME</div>
        <div class="controls">
          ↑↓ pitch &middot; ←→ bank<br>
          SPACE throttle &middot; SHIFT brake<br>
          R reset &middot; L logbook
        </div>
      </div>
    </div>
  </div>
  <div id="boot">LOADING…</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
